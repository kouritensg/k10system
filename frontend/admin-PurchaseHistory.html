<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K10 Admin - PO History</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <script src="admin-navbar.js"></script>

    <div class="max-w-7xl mx-auto px-4 mt-8 pb-12">
        
        <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-600 mb-8 flex justify-between items-end">
            <div>
                <h2 class="text-2xl font-bold text-gray-800">📜 Purchase Order History</h2>
                <p class="text-gray-500 text-sm italic">Track and review all distributor orders.</p>
            </div>
            <a href="admin-purchase.html" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded shadow transition active:scale-95">
                + New Order
            </a>
        </div>

        <div class="bg-white rounded-lg shadow-sm overflow-hidden min-h-[500px]">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 border-b text-[10px] uppercase font-bold text-gray-400 tracking-widest">
                        <tr>
                            <th class="p-4 w-40">PO Number</th>
                            <th class="p-4 w-48">Supplier</th>
                            <th class="p-4">Items Summary</th>
                            <th class="p-4 text-center w-32">Status</th>
                            <th class="p-4 text-right w-32">Date Created</th>
                            <th class="p-4 text-right w-24">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="po-table-body"></tbody>
                </table>
            </div>
            
            <div id="loading" class="p-12 text-center text-gray-500 font-bold">
                <span class="inline-block animate-bounce mr-2">⏳</span> Loading history...
            </div>
            <div id="empty-state" class="p-12 text-center text-gray-400 hidden">
                <div class="text-4xl mb-2">🔎</div>
                <p>No purchase orders found in the database.</p>
            </div>
        </div>
    </div>

    <div id="details-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden flex items-center justify-center z-[80]">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-3xl mx-4 p-6 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            <h3 class="text-xl font-bold text-gray-800 mb-4" id="modal-title">PO Details</h3>
            
            <div class="overflow-y-auto max-h-[60vh] border rounded">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-50 text-gray-500 uppercase font-bold text-[10px]">
                        <tr>
                            <th class="p-3">Product</th>
                            <th class="p-3 text-right">Cost ($)</th>
                            <th class="p-3 text-center">Qty</th>
                            <th class="p-3 text-right">Subtotal ($)</th>
                        </tr>
                    </thead>
                    <tbody id="modal-body"></tbody>
                </table>
            </div>
            
            <div class="flex justify-between items-center mt-6 pt-4 border-t">
                <div class="text-gray-500 text-sm">
                    Generated by K10 Inventory System
                </div>
                <button onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-8 rounded transition">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://k10system.onrender.com/api';

        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('k10_token')) {
                window.location.href = 'admin.html';
                return;
            }
            loadHistory();
        });

        async function loadHistory() {
            const tbody = document.getElementById('po-table-body');
            const loading = document.getElementById('loading');
            const empty = document.getElementById('empty-state');

            loading.classList.remove('hidden');
            tbody.innerHTML = '';
            empty.classList.add('hidden');

            try {
                const res = await fetch(`${API_URL}/purchase-orders?limit=20`);
                const data = await res.json();
                
                loading.classList.add('hidden');

                if (!data || !Array.isArray(data) || data.length === 0) {
                    empty.classList.remove('hidden');
                    return;
                }

                tbody.innerHTML = data.map(po => {
                    const orderDate = po.order_date ? new Date(po.order_date).toLocaleDateString() : 'N/A';
                    
                    return `
                    <tr class="border-b hover:bg-gray-50 transition">
                        <td class="p-4 font-mono font-bold text-blue-600 text-sm">#${po.po_number}</td>
                        <td class="p-4 font-bold text-gray-700">${po.supplier_name || 'Unknown'}</td>
                        <td class="p-4">
                            <div class="text-xs text-gray-600 font-medium leading-relaxed max-w-md">
                                ${po.items_summary || '<span class="text-gray-300">No items registered</span>'}
                            </div>
                        </td>
                        <td class="p-4 text-center">
                            <span class="px-3 py-1 rounded text-[10px] font-bold uppercase ${getStatusClass(po.status)}">
                                ${po.status || 'Ordered'}
                            </span>
                        </td>
                        <td class="p-4 text-right text-gray-400 text-xs font-bold">
                            ${orderDate}
                        </td>
                        <td class="p-4 text-right">
                            <button onclick="viewDetails(${po.id}, '${po.po_number}')" 
                                    class="bg-blue-50 hover:bg-blue-100 text-blue-600 p-2 rounded transition" 
                                    title="View Details">
                                👁️
                            </button>
                        </td>
                    </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error("Critical Load Error:", err);
                loading.classList.add('hidden');
                tbody.innerHTML = `<tr><td colspan="6" class="p-12 text-center text-red-500 font-bold bg-red-50">❌ Server Connection Error</td></tr>`;
            }
        }

        async function viewDetails(id, poNum) {
            document.getElementById('modal-title').innerText = `Purchase Order: ${poNum}`;
            document.getElementById('details-modal').classList.remove('hidden');
            const tbody = document.getElementById('modal-body');
            tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-gray-500 animate-pulse">Fetching item details...</td></tr>';

            try {
                const res = await fetch(`${API_URL}/purchase-orders/${id}`);
                const items = await res.json();
                
                if(!items || items.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-gray-400">No detailed records found for this PO.</td></tr>';
                    return;
                }

                tbody.innerHTML = items.map(i => {
                    const cost = parseFloat(i.unit_cost || 0);
                    const qty = parseInt(i.ordered_qty || 0);
                    const subtotal = cost * qty;

                    return `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3">
                            <div class="font-bold text-gray-800">${i.card_name}</div>
                            <div class="text-[9px] text-gray-400 uppercase font-bold tracking-tighter">${i.game_title || 'TCG Product'}</div>
                        </td>
                        <td class="p-3 text-right font-mono text-gray-600">$${cost.toFixed(2)}</td>
                        <td class="p-3 text-center font-bold text-blue-600">${qty}</td>
                        <td class="p-3 text-right font-bold text-gray-800">$${subtotal.toFixed(2)}</td>
                    </tr>
                    `;
                }).join('');
            } catch(e) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-red-500 font-bold">Error loading detailed item data.</td></tr>';
            }
        }

        function closeModal() {
            document.getElementById('details-modal').classList.add('hidden');
        }

        function getStatusClass(status) {
            switch(status) {
                case 'Ordered': return 'bg-yellow-100 text-yellow-700 border border-yellow-200';
                case 'Received': return 'bg-green-100 text-green-700 border border-green-200';
                case 'Cancelled': return 'bg-red-100 text-red-700 border border-red-200';
                default: return 'bg-gray-100 text-gray-600 border border-gray-200';
            }
        }
    </script>
</body>
</html>
