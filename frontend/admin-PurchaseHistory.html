<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K10 Admin - PO History</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <script src="admin-navbar.js"></script>

    <div class="max-w-7xl mx-auto px-4 mt-8 pb-12">
        
        <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-600 mb-8 flex justify-between items-end">
            <div>
                <h2 class="text-2xl font-bold text-gray-800">📜 Purchase Order History</h2>
                <p class="text-gray-500 text-sm">Track past orders sent to distributors.</p>
            </div>
            <a href="admin-purchase.html" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow transition">
                + New Order
            </a>
        </div>

        <div class="bg-white rounded-lg shadow-sm overflow-hidden min-h-[500px]">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 border-b text-xs uppercase font-bold text-gray-500">
                    <tr>
                        <th class="p-4">PO Number</th>
                        <th class="p-4">Supplier</th>
                        <th class="p-4">Date</th>
                        <th class="p-4 text-center">Items</th>
                        <th class="p-4 text-right">Total Cost</th>
                        <th class="p-4 text-center">Status</th>
                        <th class="p-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="po-table-body"></tbody>
            </table>
            
            <div id="loading" class="p-12 text-center text-gray-500">Loading history...</div>
            <div id="empty-state" class="p-12 text-center text-gray-400 hidden">No purchase orders found.</div>
            <div id="error-state" class="p-12 text-center text-red-500 hidden font-bold">Failed to load data. Check console.</div>
        </div>
    </div>

    <div id="details-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden flex items-center justify-center z-[80]">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-3xl mx-4 p-6 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            <h3 class="text-xl font-bold text-gray-800 mb-4" id="modal-title">PO Details</h3>
            <div class="overflow-y-auto max-h-[60vh] border rounded">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-50 text-gray-500 uppercase font-bold">
                        <tr>
                            <th class="p-3">Product</th>
                            <th class="p-3 text-right">Cost</th>
                            <th class="p-3 text-center">Qty</th>
                            <th class="p-3 text-right">Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="modal-body"></tbody>
                </table>
            </div>
            <div class="text-right mt-4 pt-4 border-t">
                 <button onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-6 rounded">Close</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://k10system.onrender.com/api';

        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('k10_token')) window.location.href = 'admin.html';
            loadHistory();
        });

        async function loadHistory() {
            const tbody = document.getElementById('po-table-body');
            const loading = document.getElementById('loading');
            const empty = document.getElementById('empty-state');
            const errorDiv = document.getElementById('error-state');

            loading.classList.remove('hidden');
            tbody.innerHTML = '';
            empty.classList.add('hidden');
            errorDiv.classList.add('hidden');

            try {
                // Fetch latest 20 orders
                const res = await fetch(`${API_URL}/purchase-orders?limit=20`);
                
                if (!res.ok) throw new Error("Server returned " + res.status);
                
                const data = await res.json();
                loading.classList.add('hidden');

                if (data.length === 0) {
                    empty.classList.remove('hidden');
                    return;
                }

                tbody.innerHTML = data.map(po => `
                    <tr class="border-b hover:bg-gray-50 transition">
                        <td class="p-4 font-mono font-bold text-blue-600 text-sm">${po.po_number}</td>
                        <td class="p-4 font-bold text-gray-800">${po.supplier_name}</td>
                        <td class="p-4 text-sm text-gray-500">${new Date(po.order_date).toLocaleDateString()}</td>
                        <td class="p-4 text-center font-bold text-gray-700">${po.total_items}</td>
                        <td class="p-4 text-right font-bold text-green-700">$${parseFloat(po.total_cost).toFixed(2)}</td>
                        <td class="p-4 text-center">
                            <span class="px-2 py-1 rounded text-xs font-bold uppercase 
                                ${po.status === 'Ordered' ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800'}">
                                ${po.status}
                            </span>
                        </td>
                        <td class="p-4 text-right">
                            <button onclick="viewDetails(${po.id}, '${po.po_number}')" class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1 rounded text-xs font-bold">
                                👁️ View
                            </button>
                        </td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error(err);
                loading.classList.add('hidden');
                errorDiv.classList.remove('hidden');
                errorDiv.innerText = "Error: " + err.message;
            }
        }

        async function viewDetails(id, poNum) {
            document.getElementById('modal-title').innerText = `Details: ${poNum}`;
            document.getElementById('details-modal').classList.remove('hidden');
            const tbody = document.getElementById('modal-body');
            tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center">Loading items...</td></tr>';

            try {
                const res = await fetch(`${API_URL}/purchase-orders/${id}`);
                const items = await res.json();
                
                if(items.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-gray-400">No items found in this order.</td></tr>';
                    return;
                }

                tbody.innerHTML = items.map(i => `
                    <tr class="border-b">
                        <td class="p-3">
                            <div class="font-bold text-gray-800">${i.card_name}</div>
                            <div class="text-xs text-gray-500 uppercase">${i.game_title}</div>
                        </td>
                        <td class="p-3 text-right text-gray-600">$${parseFloat(i.unit_cost).toFixed(2)}</td>
                        <td class="p-3 text-center font-bold">${i.ordered_qty}</td>
                        <td class="p-3 text-right font-bold text-gray-800">$${(i.ordered_qty * i.unit_cost).toFixed(2)}</td>
                    </tr>
                `).join('');
            } catch(e) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-red-500">Failed to load details.</td></tr>';
            }
        }

        function closeModal() {
            document.getElementById('details-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
