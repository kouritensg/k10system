<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>K10 Admin - PO Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800 pb-20">

    <script src="admin-navbar.js"></script>

    <div class="max-w-7xl mx-auto px-4 mt-8">
        <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-600 mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h2 class="text-2xl font-bold">📜 Purchase History</h2>
                <p class="text-xs text-gray-400 font-bold uppercase">Manage Deliveries & Preorder Payments</p>
            </div>
            <div class="flex gap-2">
                <input type="text" id="filter-search" onkeyup="applyFilters()" placeholder="Search PO or Supplier..." class="p-2 border rounded text-sm w-64 outline-none focus:ring-2 focus:ring-blue-500">
                <select id="filter-status" onchange="applyFilters()" class="p-2 border rounded text-sm font-bold text-gray-600">
                    <option value="">All Status</option>
                    <option value="Ordered">Ordered</option>
                    <option value="Received">Received</option>
                </select>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-sm overflow-hidden min-h-[500px]">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 border-b text-[10px] uppercase font-bold text-gray-400">
                    <tr>
                        <th class="p-4">PO Number</th>
                        <th class="p-4">Supplier</th>
                        <th class="p-4">Finance (Value/Paid)</th>
                        <th class="p-4">Items Summary</th>
                        <th class="p-4 text-center">Status</th>
                        <th class="p-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="po-table-body"></tbody>
            </table>
            <div id="loading" class="p-12 text-center text-gray-400 animate-pulse font-bold">⏳ Syncing with database...</div>
        </div>
    </div>

    <div id="manage-modal" class="fixed inset-0 bg-gray-900 bg-opacity-60 hidden flex items-center justify-center z-[100]">
        <div class="bg-white rounded-lg shadow-2xl w-full max-w-xl p-8 relative">
            <h3 class="text-xl font-bold mb-6 border-b pb-2" id="manage-title">Manage Order</h3>
            
            <div class="space-y-6">
                <div class="bg-green-50 p-4 rounded-lg border border-green-200">
                    <label class="text-[10px] font-bold text-green-700 uppercase">💰 Record New Payment (Invoice)</label>
                    <div class="flex gap-2 mt-2">
                        <input type="number" id="new-pay-amount" step="0.01" class="flex-grow p-2 border rounded font-bold" placeholder="0.00">
                        <button onclick="submitPayment()" class="bg-green-600 text-white px-4 py-2 rounded font-bold hover:bg-green-700 shadow">Update</button>
                    </div>
                    <p id="pay-summary" class="text-[10px] text-green-600 mt-2 font-bold uppercase"></p>
                </div>

                <div class="bg-blue-50 p-4 rounded-lg border border-blue-200">
                    <label class="text-[10px] font-bold text-blue-700 uppercase">📦 Inventory Receipt</label>
                    <p class="text-xs text-gray-500 mb-3">Mark this order as received to add all items to live stock.</p>
                    <button onclick="markAsReceived()" class="w-full bg-blue-600 text-white py-3 rounded font-bold shadow-lg hover:bg-blue-700">Confirm Receipt of Stock</button>
                </div>
            </div>

            <div class="mt-8 text-right">
                <button onclick="closeManageModal()" class="text-gray-400 font-bold hover:underline uppercase text-xs">Close Window</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://k10system.onrender.com/api';
        let globalOrders = [];
        let currentManageId = null;

        document.addEventListener('DOMContentLoaded', loadHistory);

        async function loadHistory() {
            try {
                const res = await fetch(`${API_URL}/purchase-orders`);
                globalOrders = await res.json();
                document.getElementById('loading').classList.add('hidden');
                applyFilters();
            } catch (e) { document.getElementById('loading').innerText = "Connection Error"; }
        }

        function applyFilters() {
            const search = document.getElementById('filter-search').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            const tbody = document.getElementById('po-table-body');

            const filtered = globalOrders.filter(o => {
                const matchSearch = o.po_number.toLowerCase().includes(search) || o.supplier_name.toLowerCase().includes(search);
                const matchStatus = !status || o.status === status;
                return matchSearch && matchStatus;
            });

            tbody.innerHTML = filtered.map(o => {
                const total = parseFloat(o.calculated_total || 0);
                const paid = parseFloat(o.paid_amount || 0);
                const isPaid = paid >= (total - 0.01);
                
                return `
                <tr class="border-b hover:bg-gray-50 transition text-xs">
                    <td class="p-4 font-mono font-bold text-blue-600">#${o.po_number}</td>
                    <td class="p-4 font-bold text-gray-700">${o.supplier_name}</td>
                    <td class="p-4">
                        <div class="font-bold">$${total.toFixed(2)}</div>
                        <div class="text-[9px] font-bold uppercase ${isPaid ? 'text-green-500' : 'text-orange-500'}">
                            ${isPaid ? '✅ Fully Paid' : `Paid: $${paid.toFixed(2)}`}
                        </div>
                    </td>
                    <td class="p-4 text-gray-500 max-w-xs truncate">${o.items_summary || '-'}</td>
                    <td class="p-4 text-center">
                        <span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${o.status === 'Received' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">
                            ${o.status}
                        </span>
                    </td>
                    <td class="p-4 text-right space-x-2">
                        <button onclick="openManageModal(${o.id}, '${o.po_number}', ${total}, ${paid})" class="bg-gray-800 text-white px-3 py-1 rounded text-[10px] font-bold uppercase">Manage</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function openManageModal(id, poNum, total, paid) {
            currentManageId = id;
            document.getElementById('manage-title').innerText = `PO: ${poNum}`;
            document.getElementById('pay-summary').innerText = `Total Order Value: $${total.toFixed(2)} | Current Paid: $${paid.toFixed(2)}`;
            document.getElementById('manage-modal').classList.remove('hidden');
        }

        async function submitPayment() {
            const amount = parseFloat(document.getElementById('new-pay-amount').value) || 0;
            if(amount <= 0) return alert("Enter amount");
            const res = await fetch(`${API_URL}/purchase-orders/${currentManageId}/payment`, {
                method: 'PUT', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ amount })
            });
            if(res.ok) { alert("Paid!"); location.reload(); }
        }

        async function markAsReceived() {
            if(!confirm("Stock-in all items?")) return;
            const res = await fetch(`${API_URL}/purchase-orders/${currentManageId}/receive-all`, { method: 'PUT' });
            if(res.ok) { alert("Inventory Updated!"); location.reload(); }
        }

        function closeManageModal() { document.getElementById('manage-modal').classList.add('hidden'); }
    </script>
</body>
</html>
