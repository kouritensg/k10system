<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K10 Admin - PO History</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <script src="admin-navbar.js"></script>

    <div class="max-w-7xl mx-auto px-4 mt-8 pb-12">
        
        <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-600 mb-8 flex justify-between items-end">
            <div>
                <h2 class="text-2xl font-bold text-gray-800">📜 Purchase Order History</h2>
                <p class="text-gray-500 text-sm italic">Track and review all distributor orders.</p>
            </div>
            <a href="admin-purchase.html" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded shadow transition active:scale-95">
                + New Order
            </a>
        </div>

        <div class="bg-white rounded-lg shadow-sm overflow-hidden min-h-[500px]">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 border-b text-[10px] uppercase font-bold text-gray-400 tracking-widest">
                        <tr>
                            <th class="p-4 w-40">PO Number</th>
                            <th class="p-4 w-48">Supplier</th>
                            <th class="p-4">Items Summary</th>
                            <th class="p-4 text-center w-32">Status</th>
                            <th class="p-4 text-right w-40">Date Created</th>
                        </tr>
                    </thead>
                    <tbody id="po-table-body">
                        </tbody>
                </table>
            </div>
            
            <div id="loading" class="p-12 text-center text-gray-500 font-bold">
                <span class="inline-block animate-bounce mr-2">⏳</span> Loading history...
            </div>
            <div id="empty-state" class="p-12 text-center text-gray-400 hidden">
                <div class="text-4xl mb-2">🔎</div>
                <p>No purchase orders found in the database.</p>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_URL = 'https://k10system.onrender.com/api';

        document.addEventListener('DOMContentLoaded', () => {
            // Auth check
            if (!localStorage.getItem('k10_token')) {
                window.location.href = 'admin.html';
                return;
            }
            loadHistory();
        });

        async function loadHistory() {
            const tbody = document.getElementById('po-table-body');
            const loading = document.getElementById('loading');
            const empty = document.getElementById('empty-state');

            // Reset UI
            loading.classList.remove('hidden');
            tbody.innerHTML = '';
            empty.classList.add('hidden');

            try {
                // Fetch the latest 20 orders
                const res = await fetch(`${API_URL}/purchase-orders?limit=20`);
                
                // Even if backend returns 500, we check if there's valid data
                const data = await res.json();
                
                loading.classList.add('hidden');

                // Safety check: ensure we have an array
                if (!data || !Array.isArray(data) || data.length === 0) {
                    empty.classList.remove('hidden');
                    return;
                }

                tbody.innerHTML = data.map(po => {
                    // Safety check for Date
                    const orderDate = po.order_date ? new Date(po.order_date).toLocaleDateString() : 'N/A';
                    
                    return `
                    <tr class="border-b hover:bg-gray-50 transition">
                        <td class="p-4 font-mono font-bold text-blue-600 text-sm">#${po.po_number}</td>
                        <td class="p-4 font-bold text-gray-700">${po.supplier_name || 'Unknown'}</td>
                        <td class="p-4">
                            <div class="text-xs text-gray-600 font-medium leading-relaxed max-w-md">
                                ${po.items_summary || '<span class="text-gray-300">No items registered</span>'}
                            </div>
                        </td>
                        <td class="p-4 text-center">
                            <span class="px-3 py-1 rounded text-[10px] font-bold uppercase 
                                ${getStatusClass(po.status)}">
                                ${po.status || 'Ordered'}
                            </span>
                        </td>
                        <td class="p-4 text-right text-gray-400 text-xs font-bold">
                            ${orderDate}
                        </td>
                    </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error("Critical Load Error:", err);
                loading.classList.add('hidden');
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="p-12 text-center text-red-500 font-bold bg-red-50">
                            ❌ Error communicating with server. Check database connections.
                        </td>
                    </tr>
                `;
            }
        }

        // Color coding for status tags
        function getStatusClass(status) {
            switch(status) {
                case 'Ordered': return 'bg-yellow-100 text-yellow-700 border border-yellow-200';
                case 'Invoiced': return 'bg-blue-100 text-blue-700 border border-blue-200';
                case 'Received': return 'bg-green-100 text-green-700 border border-green-200';
                case 'Cancelled': return 'bg-red-100 text-red-700 border border-red-200';
                default: return 'bg-gray-100 text-gray-600 border border-gray-200';
            }
        }
    </script>
</body>
</html>
