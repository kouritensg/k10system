<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K10 Admin - Inventory Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <script src="admin-navbar.js"></script>

    <div class="max-w-[95%] mx-auto px-4 mt-8 pb-12">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <div class="w-full lg:w-1/4 space-y-6">
                <div class="bg-white p-6 rounded-lg shadow-sm border-t-4 border-blue-600 sticky top-24">
                    <h2 class="text-lg font-bold text-gray-800 mb-4">🔍 Filter Inventory</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Search</label>
                            <input type="text" id="filter-search" placeholder="Name, Barcode, or ID..." class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Game Title</label>
                            <select id="filter-game" class="w-full p-2 border rounded bg-gray-50">
                                <option value="">All Games</option>
                                <option value="One Piece">One Piece</option>
                                <option value="Pokemon">Pokemon</option>
                                <option value="Hololive">Hololive</option>
                                <option value="Digimon">Digimon</option>
                                <option value="Dragon Ball">Dragon Ball</option>
                                <option value="Union Arena">Union Arena</option>
                                <option value="Accessories">Accessories</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Product Category</label>
                            <select id="filter-type" class="w-full p-2 border rounded bg-gray-50">
                                <option value="">All Categories</option>
                                <option value="Booster Box">Booster Box</option>
                                <option value="Booster Pack">Booster Pack</option>
                                <option value="Single">Single Card</option>
                                <option value="Sleeves">Sleeves</option>
                                <option value="Deck Box">Deck Box</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full lg:w-3/4 space-y-6">

                <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-green-500">
                    <div class="flex justify-between items-center mb-4 cursor-pointer" onclick="toggleAddForm()">
                        <h2 class="text-lg font-bold text-gray-800">➕ Add New Product</h2>
                        <span id="form-toggle-icon" class="text-gray-400 text-sm">▼</span>
                    </div>
                    
                    <div id="add-product-form" class="hidden">
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Game</label>
                                <select id="add-game" class="w-full p-2 border rounded text-sm">
                                    <option value="One Piece">One Piece</option>
                                    <option value="Pokemon">Pokemon</option>
                                    <option value="Hololive">Hololive</option>
                                    <option value="Digimon">Digimon</option>
                                    <option value="Dragon Ball">Dragon Ball</option>
                                    <option value="Union Arena">Union Arena</option>
                                    <option value="Accessories">Accessories</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Category</label>
                                <select id="add-type" onchange="toggleConfigFields()" class="w-full p-2 border rounded text-sm">
                                    <option value="Booster Box">Booster Box</option>
                                    <option value="Booster Pack">Booster Pack</option>
                                    <option value="Single">Single Card</option>
                                    <option value="Sleeves">Sleeves</option>
                                    <option value="Deck Box">Deck Box</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Barcode</label>
                                <input type="text" id="add-barcode" class="w-full p-2 border rounded text-sm">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Set/Card ID</label>
                                <input type="text" id="add-id" placeholder="OP01-001" class="w-full p-2 border rounded text-sm">
                            </div>
                        </div>

                        <div id="ratio-config" class="hidden bg-yellow-50 p-3 rounded mb-4 border border-yellow-200">
                            <h4 class="text-xs font-bold text-yellow-700 uppercase mb-2">⚙️ Unit Configuration</h4>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] font-bold text-gray-500">Packs per Box</label>
                                    <input type="number" id="add-ppb" value="24" class="w-full p-1 border rounded text-sm">
                                    <div class="text-[9px] text-gray-400">e.g. 24 for One Piece</div>
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-gray-500">Boxes per Case</label>
                                    <input type="number" id="add-bpc" value="12" class="w-full p-1 border rounded text-sm">
                                    <div class="text-[9px] text-gray-400">e.g. 12 per Case</div>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Product Name *</label>
                                <input type="text" id="add-name" class="w-full p-2 border rounded text-sm font-bold">
                            </div>
                            <div class="grid grid-cols-3 gap-2">
                                <div>
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Cost ($)</label>
                                    <input type="number" id="add-cost" class="w-full p-2 border rounded text-sm bg-blue-50">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Sell ($)</label>
                                    <input type="number" id="add-price" class="w-full p-2 border rounded text-sm">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Total Packs</label>
                                    <input type="number" id="add-stock" placeholder="Total Qty" class="w-full p-2 border rounded text-sm font-bold">
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <button onclick="addProduct()" class="bg-green-600 hover:bg-green-700 text-white font-bold px-6 py-2 rounded shadow-md transition">
                                Save Product
                            </button>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-sm overflow-hidden min-h-[600px]">
                    <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                        <span class="text-xs font-bold text-gray-500 uppercase" id="result-count">0 Items Found</span>
                        <button onclick="loadInventory()" class="text-blue-600 text-xs font-bold hover:underline">↻ Refresh</button>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-white border-b text-xs uppercase font-bold text-gray-400">
                                <tr>
                                    <th class="p-4">Product Details</th>
                                    <th class="p-4">Type</th>
                                    <th class="p-4 text-right">Price</th>
                                    <th class="p-4">Stock Breakdown</th>
                                    <th class="p-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-table-body"></tbody>
                        </table>
                    </div>
                    <div id="loading" class="p-12 text-center text-gray-500">Loading inventory...</div>
                    <div id="empty-state" class="p-12 text-center text-gray-400 hidden">No items match your filters.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://k10system.onrender.com/api';
        let globalInventory = [];

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('k10_token');
            if (!token) window.location.href = 'admin.html';
            
            loadInventory();
            
            document.getElementById('filter-search').addEventListener('keyup', applyFilters);
            document.getElementById('filter-game').addEventListener('change', applyFilters);
            document.getElementById('filter-type').addEventListener('change', applyFilters);
        });

        // --- 1. TOGGLE CONFIG FIELDS ---
        function toggleConfigFields() {
            const type = document.getElementById('add-type').value;
            const configDiv = document.getElementById('ratio-config');
            
            // Show config if it's a Box or Pack
            if (type === 'Booster Box' || type === 'Booster Pack') {
                configDiv.classList.remove('hidden');
            } else {
                configDiv.classList.add('hidden');
            }
        }

        // --- 2. LOAD & RENDER ---
        async function loadInventory() {
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');
            
            try {
                const res = await fetch(`${API_URL}/inventory/status`);
                const data = await res.json();
                
                if (Array.isArray(data)) {
                    globalInventory = data;
                    applyFilters();
                }
                loading.classList.add('hidden');
            } catch (e) { loading.innerText = "Error loading data."; }
        }

        function applyFilters() {
            const search = document.getElementById('filter-search').value.toLowerCase();
            const game = document.getElementById('filter-game').value;
            const type = document.getElementById('filter-type').value;

            const filtered = globalInventory.filter(p => {
                const matchSearch = !search || p.card_name.toLowerCase().includes(search);
                const matchGame = !game || p.game_title === game;
                const matchType = !type || p.product_type === type;
                return matchSearch && matchGame && matchType;
            });
            
            renderTable(filtered);
        }

        function renderTable(items) {
            const tbody = document.getElementById('inventory-table-body');
            const empty = document.getElementById('empty-state');
            document.getElementById('result-count').innerText = `${items.length} Items`;

            if (items.length === 0) {
                tbody.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            tbody.innerHTML = items.map(p => {
                // --- SMART CONVERSION LOGIC ---
                let stockDisplay = `<span class="font-bold text-gray-800">${p.stock_quantity}</span>`;
                
                // Only do math if it's a Box/Pack AND we have ratios
                if ((p.product_type === 'Booster Box' || p.product_type === 'Booster Pack') && p.packs_per_box > 1) {
                    const totalPacks = p.stock_quantity;
                    const ppb = p.packs_per_box;
                    const bpc = p.boxes_per_case || 1; // Default to 1 if missing
                    
                    const fullBoxes = Math.floor(totalPacks / ppb);
                    const leftOverPacks = totalPacks % ppb;
                    
                    const fullCases = Math.floor(fullBoxes / bpc);
                    const leftOverBoxes = fullBoxes % bpc;

                    stockDisplay = `
                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-gray-800">${totalPacks} Packs Total</span>
                            <span class="text-xs text-blue-600 font-bold bg-blue-50 px-2 py-1 rounded mt-1 border border-blue-100">
                                📦 ${fullCases} Case, ${leftOverBoxes} Box, ${leftOverPacks} Pack
                            </span>
                        </div>
                    `;
                }

                return `
                <tr class="border-b hover:bg-gray-50 transition">
                    <td class="p-4">
                        <div class="font-bold text-gray-800 text-sm">${p.card_name}</div>
                        <div class="text-[10px] text-gray-400 font-mono mt-0.5">ID: ${p.card_id || '-'}</div>
                    </td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded text-[10px] font-bold uppercase bg-gray-100 text-gray-600">
                            ${p.game_title}
                        </span>
                    </td>
                    <td class="p-4 text-right font-bold text-gray-700">$${parseFloat(p.price).toFixed(2)}</td>
                    <td class="p-4">
                        ${stockDisplay}
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="deleteProduct(${p.id})" class="text-red-400 hover:text-red-600 font-bold text-xs">Delete</button>
                    </td>
                </tr>
                `;
            }).join('');
        }

        function toggleAddForm() {
            document.getElementById('add-product-form').classList.toggle('hidden');
        }

        async function addProduct() {
            // Get Ratios (Default to 1 if hidden or empty)
            let ppb = 1, bpc = 1;
            const type = document.getElementById('add-type').value;
            if (type === 'Booster Box' || type === 'Booster Pack') {
                ppb = document.getElementById('add-ppb').value || 1;
                bpc = document.getElementById('add-bpc').value || 1;
            }

            const data = {
                game_title: document.getElementById('add-game').value,
                product_type: type,
                card_name: document.getElementById('add-name').value,
                price: document.getElementById('add-price').value,
                cost_price: document.getElementById('add-cost').value,
                stock_quantity: document.getElementById('add-stock').value,
                barcode: document.getElementById('add-barcode').value,
                card_id: document.getElementById('add-id').value,
                packs_per_box: ppb, // Send to backend
                boxes_per_case: bpc // Send to backend
            };

            if (!data.card_name) return alert("Product Name is required");

            try {
                const res = await fetch(`${API_URL}/inventory/add`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(data) 
                });
                if (res.ok) {
                    alert("Product Added!");
                    document.getElementById('add-name').value = '';
                    loadInventory(); 
                }
            } catch (e) { alert("Connection Error"); }
        }

        async function deleteProduct(id) {
            if(confirm("Delete item?")) {
                await fetch(`${API_URL}/inventory/${id}`, { method: 'DELETE' });
                loadInventory();
            }
        }
    </script>
</body>
</html>
