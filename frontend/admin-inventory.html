<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K10 Admin - Inventory Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <script src="admin-navbar.js"></script>

    <div class="max-w-[95%] mx-auto px-4 mt-8 pb-12">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <div class="w-full lg:w-1/4 space-y-6">
                <div class="bg-white p-6 rounded-lg shadow-sm border-t-4 border-blue-600 sticky top-24">
                    <h2 class="text-lg font-bold text-gray-800 mb-4">🔍 Filter Inventory</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Search</label>
                            <input type="text" id="filter-search" placeholder="Name, Barcode..." class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Category</label>
                            <select id="filter-category" class="w-full p-2 border rounded bg-gray-50">
                                <option value="">All Categories</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full lg:w-3/4 space-y-6">

                <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-green-500">
                    <div class="flex justify-between items-center mb-4 cursor-pointer" onclick="toggleAddForm()">
                        <h2 class="text-lg font-bold text-gray-800">➕ Add New Product</h2>
                        <span id="form-toggle-icon" class="text-gray-400 text-sm">▼</span>
                    </div>
                    
                    <div id="add-product-form" class="hidden">
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Game Title</label>
                                <input type="text" id="add-game" placeholder="e.g. One Piece" class="w-full p-2 border rounded text-sm">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Category *</label>
                                <select id="add-category" onchange="toggleConfigFields()" class="w-full p-2 border rounded text-sm font-bold">
                                    <option value="">Loading categories...</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Barcode</label>
                                <input type="text" id="add-barcode" class="w-full p-2 border rounded text-sm">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Card ID</label>
                                <input type="text" id="add-id" placeholder="OP01-001" class="w-full p-2 border rounded text-sm">
                            </div>
                        </div>

                        <div id="ratio-config" class="hidden bg-blue-50 p-3 rounded mb-4 border border-blue-200">
                            <h4 class="text-[10px] font-bold text-blue-700 uppercase mb-2">Unit Configuration (For Boxes/Packs)</h4>
                            <div class="grid grid-cols-2 gap-4">
                                <input type="number" id="add-ppb" placeholder="Packs per Box" class="p-2 border rounded text-sm">
                                <input type="number" id="add-bpc" placeholder="Boxes per Case" class="p-2 border rounded text-sm">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            <input type="text" id="add-name" placeholder="Product Name *" class="w-full p-2 border rounded font-bold">
                            <div class="grid grid-cols-3 gap-2">
                                <input type="number" id="add-cost" placeholder="Cost ($)" class="p-2 border rounded bg-gray-50">
                                <input type="number" id="add-price" placeholder="Sell ($)" class="p-2 border rounded">
                                <input type="number" id="add-stock" placeholder="Qty" class="p-2 border rounded font-bold">
                            </div>
                        </div>
                        <div class="text-right">
                            <button onclick="addProduct()" class="bg-green-600 text-white font-bold px-6 py-2 rounded shadow transition active:scale-95">Save Product</button>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-sm overflow-hidden min-h-[600px]">
                    <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                        <span class="text-xs font-bold text-gray-500 uppercase" id="result-count">0 Items Found</span>
                        <button onclick="loadInventory()" class="text-blue-600 text-xs font-bold hover:underline">↻ Refresh</button>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-white border-b text-xs uppercase font-bold text-gray-400">
                                <tr>
                                    <th class="p-4">Product Details</th>
                                    <th class="p-4">Category</th>
                                    <th class="p-4 text-right">Price</th>
                                    <th class="p-4">Stock</th>
                                    <th class="p-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-table-body"></tbody>
                        </table>
                    </div>
                    <div id="loading" class="p-12 text-center text-gray-500 font-bold">⏳ Loading Inventory...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://k10system.onrender.com/api';
        let globalInventory = [];
        let categories = [];

        document.addEventListener('DOMContentLoaded', async () => {
            if (!localStorage.getItem('k10_token')) window.location.href = 'admin.html';
            await loadCategories();
            await loadInventory();
            
            document.getElementById('filter-search').addEventListener('input', applyFilters);
            document.getElementById('filter-category').addEventListener('change', applyFilters);
        });

        async function loadCategories() {
            try {
                const res = await fetch(`${API_URL}/categories`);
                categories = await res.json();
                
                document.getElementById('add-category').innerHTML = '<option value="">-- Select Type --</option>' + 
                    categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                
                document.getElementById('filter-category').innerHTML = '<option value="">All Categories</option>' + 
                    categories.map(c => `<option value="${c.id}">${c.id}</option>`).join(''); // Using ID for filter logic match
            } catch (e) { console.error("Category Load Error"); }
        }

        async function loadInventory() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const res = await fetch(`${API_URL}/inventory/status`);
                globalInventory = await res.json();
                applyFilters();
                document.getElementById('loading').classList.add('hidden');
            } catch (e) { document.getElementById('loading').innerText = "Error loading data."; }
        }

        function toggleConfigFields() {
            const catId = document.getElementById('add-category').value;
            const catName = categories.find(c => c.id == catId)?.name || "";
            const config = document.getElementById('ratio-config');
            
            if (catName.includes('Box') || catName.includes('Pack') || catName.includes('Case')) {
                config.classList.remove('hidden');
            } else {
                config.classList.add('hidden');
            }
        }

        function applyFilters() {
            const search = document.getElementById('filter-search').value.toLowerCase();
            const catId = document.getElementById('filter-category').value;

            const filtered = globalInventory.filter(p => {
                const matchSearch = !search || p.card_name.toLowerCase().includes(search) || (p.barcode && p.barcode.includes(search));
                const matchCat = !catId || p.category_id == catId;
                return matchSearch && matchCat;
            });
            
            renderTable(filtered);
        }

        function renderTable(items) {
            const tbody = document.getElementById('inventory-table-body');
            document.getElementById('result-count').innerText = `${items.length} Items Found`;

            tbody.innerHTML = items.map(p => {
                let stockUI = `<span class="font-bold text-gray-800">${p.stock_quantity}</span>`;
                
                // Smart conversion display
                if (p.packs_per_box > 1 && p.stock_quantity > 0) {
                    const ppb = p.packs_per_box;
                    const bpc = p.boxes_per_case || 1;
                    const fullBoxes = Math.floor(p.stock_quantity / ppb);
                    const leftPacks = p.stock_quantity % ppb;
                    const fullCases = Math.floor(fullBoxes / bpc);
                    const leftBoxes = fullBoxes % bpc;
                    
                    stockUI = `
                        <div class="text-xs">
                            <div class="font-bold">${p.stock_quantity} Packs</div>
                            <div class="text-blue-500 font-medium">📦 ${fullCases}C, ${leftBoxes}B, ${leftPacks}P</div>
                        </div>`;
                }

                return `
                <tr class="border-b hover:bg-gray-50 transition text-sm">
                    <td class="p-4">
                        <div class="font-bold text-gray-800">${p.card_name}</div>
                        <div class="text-[10px] text-gray-400 font-mono">${p.card_id || '-'}</div>
                    </td>
                    <td class="p-4">
                        <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-blue-50 text-blue-600 uppercase border border-blue-100">
                            ${p.category_name || 'Unknown'}
                        </span>
                    </td>
                    <td class="p-4 text-right font-bold">$${parseFloat(p.price).toFixed(2)}</td>
                    <td class="p-4">${stockUI}</td>
                    <td class="p-4 text-right">
                        <button onclick="deleteProduct(${p.id})" class="text-red-400 hover:text-red-600 font-bold">Delete</button>
                    </td>
                </tr>`;
            }).join('');
        }

        async function addProduct() {
            const data = {
                category_id: document.getElementById('add-category').value,
                game_title: document.getElementById('add-game').value,
                card_name: document.getElementById('add-name').value,
                price: document.getElementById('add-price').value,
                cost_price: document.getElementById('add-cost').value,
                stock_quantity: document.getElementById('add-stock').value,
                barcode: document.getElementById('add-barcode').value,
                card_id: document.getElementById('add-id').value,
                packs_per_box: document.getElementById('add-ppb').value || 1,
                boxes_per_case: document.getElementById('add-bpc').value || 1
            };

            if (!data.category_id || !data.card_name) return alert("Category and Name are required!");

            const res = await fetch(`${API_URL}/inventory/add`, { 
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) 
            });
            if (res.ok) { alert("Product Added!"); loadInventory(); }
        }

        async function deleteProduct(id) {
            if(confirm("Confirm deletion?")) {
                await fetch(`${API_URL}/inventory/${id}`, { method: 'DELETE' });
                loadInventory();
            }
        }

        function toggleAddForm() { document.getElementById('add-product-form').classList.toggle('hidden'); }
    </script>
</body>
</html>
