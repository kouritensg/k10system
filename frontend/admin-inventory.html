<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K10 Admin - Inventory Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <script src="admin-navbar.js"></script>

    <div class="max-w-[95%] mx-auto px-4 mt-8 pb-12">
        
        <div class="flex flex-col lg:flex-row gap-8">
            
            <div class="w-full lg:w-1/4 space-y-6">
                
                <div class="bg-white p-6 rounded-lg shadow-sm border-t-4 border-blue-600 sticky top-24">
                    <h2 class="text-lg font-bold text-gray-800 mb-4">🔍 Filter Inventory</h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Search</label>
                            <input type="text" id="filter-search" placeholder="Name, Barcode, or ID..." 
                                   class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>

                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Game Title</label>
                            <select id="filter-game" class="w-full p-2 border rounded bg-gray-50">
                                <option value="">All Games</option>
                                <option value="One Piece">One Piece</option>
                                <option value="Pokemon">Pokemon</option>
                                <option value="Hololive">Hololive</option>
                                <option value="Digimon">Digimon</option>
                                <option value="Dragon Ball">Dragon Ball FW</option>
                                <option value="Union Arena">Union Arena</option>
                                <option value="Magic">Magic: The Gathering</option>
                                <option value="Yugioh">Yu-Gi-Oh!</option>
                                <option value="Lorcana">Lorcana</option>
                                <option value="Vanguard">Cardfight!! Vanguard</option>
                                <option value="Weiss Schwarz">Weiss Schwarz</option>
                                <option value="Shadowverse">Shadowverse</option>
                                <option value="Accessories">Accessories (General)</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Product Category</label>
                            <select id="filter-type" class="w-full p-2 border rounded bg-gray-50">
                                <option value="">All Categories</option>
                                <option value="Booster Box">Booster Box</option>
                                <option value="Booster Pack">Booster Pack</option>
                                <option value="Single">Single Card</option>
                                <option value="Starter Deck">Starter Deck</option>
                                <option value="Sleeves">Sleeves</option>
                                <option value="Deck Box">Deck Box</option>
                                <option value="Playmat">Playmat</option>
                                <option value="Dice">Dice / Counters</option>
                                <option value="Binder">Binder / Storage</option>
                            </select>
                        </div>

                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Stock Status</label>
                            <select id="filter-stock" class="w-full p-2 border rounded bg-gray-50">
                                <option value="">Any Stock Level</option>
                                <option value="Low">⚠️ Low Stock (< 5)</option>
                                <option value="Out">❌ Out of Stock (0)</option>
                                <option value="In">✅ In Stock (> 0)</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full lg:w-3/4 space-y-6">

                <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-green-500">
                    <div class="flex justify-between items-center mb-4 cursor-pointer" onclick="toggleAddForm()">
                        <h2 class="text-lg font-bold text-gray-800">➕ Add New Product</h2>
                        <span id="form-toggle-icon" class="text-gray-400 text-sm">▼</span>
                    </div>
                    
                    <div id="add-product-form" class="hidden">
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Game</label>
                                <select id="add-game" class="w-full p-2 border rounded text-sm">
                                    <option value="One Piece">One Piece</option>
                                    <option value="Pokemon">Pokemon</option>
                                    <option value="Hololive">Hololive</option>
                                    <option value="Digimon">Digimon</option>
                                    <option value="Dragon Ball">Dragon Ball</option>
                                    <option value="Union Arena">Union Arena</option>
                                    <option value="Accessories">Accessories</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Category</label>
                                <select id="add-type" class="w-full p-2 border rounded text-sm">
                                    <option value="Booster Box">Booster Box</option>
                                    <option value="Single">Single Card</option>
                                    <option value="Sleeves">Sleeves</option>
                                    <option value="Deck Box">Deck Box</option>
                                    <option value="Dice">Dice</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Barcode</label>
                                <input type="text" id="add-barcode" class="w-full p-2 border rounded text-sm">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Set/Card ID</label>
                                <input type="text" id="add-id" placeholder="OP01-001" class="w-full p-2 border rounded text-sm">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Product Name *</label>
                                <input type="text" id="add-name" class="w-full p-2 border rounded text-sm font-bold">
                            </div>
                            <div class="grid grid-cols-3 gap-2">
                                <div>
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Cost ($)</label>
                                    <input type="number" id="add-cost" class="w-full p-2 border rounded text-sm bg-blue-50">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Sell ($)</label>
                                    <input type="number" id="add-price" class="w-full p-2 border rounded text-sm">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Qty</label>
                                    <input type="number" id="add-stock" class="w-full p-2 border rounded text-sm font-bold">
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <button onclick="addProduct()" class="bg-green-600 hover:bg-green-700 text-white font-bold px-6 py-2 rounded shadow-md transition">
                                Save Product
                            </button>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-sm overflow-hidden min-h-[600px]">
                    <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                        <span class="text-xs font-bold text-gray-500 uppercase" id="result-count">0 Items Found</span>
                        <button onclick="loadInventory()" class="text-blue-600 text-xs font-bold hover:underline">↻ Refresh</button>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-white border-b text-xs uppercase font-bold text-gray-400">
                                <tr>
                                    <th class="p-4">Product Details</th>
                                    <th class="p-4">Category</th>
                                    <th class="p-4 text-right">Price</th>
                                    <th class="p-4 text-center">Stock</th>
                                    <th class="p-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-table-body"></tbody>
                        </table>
                    </div>
                    
                    <div id="loading" class="p-12 text-center text-gray-500">Loading inventory...</div>
                    <div id="empty-state" class="p-12 text-center text-gray-400 hidden">No items match your filters.</div>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden flex items-center justify-center z-[70]">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="text-xl font-bold text-gray-800">Edit Product</h3>
                <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            
            <input type="hidden" id="edit-id">
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Product Name</label>
                    <input type="text" id="edit-name" disabled class="bg-gray-100 border rounded w-full py-2 px-3 text-gray-600 mt-1">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">Cost Price ($)</label>
                        <input type="number" id="edit-cost" step="0.01" class="border rounded p-2 w-full mt-1 bg-blue-50 focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">Sell Price ($)</label>
                        <input type="number" id="edit-price" step="0.01" class="border rounded p-2 w-full mt-1 focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Current Stock</label>
                    <input type="number" id="edit-stock" class="border rounded p-2 w-full mt-1 font-bold text-lg text-center focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div class="flex justify-end space-x-3 pt-4 mt-4">
                    <button onclick="closeEditModal()" class="px-4 py-2 text-gray-600 font-bold hover:bg-gray-100 rounded">Cancel</button>
                    <button onclick="saveEdit()" class="px-6 py-2 bg-blue-600 text-white font-bold rounded hover:bg-blue-700 shadow-md transition">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://k10system.onrender.com/api';
        let globalInventory = [];

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('k10_token');
            if (!token) window.location.href = 'admin.html';
            
            loadInventory();
            
            // Event Listeners for Filters
            document.getElementById('filter-search').addEventListener('keyup', applyFilters);
            document.getElementById('filter-game').addEventListener('change', applyFilters);
            document.getElementById('filter-type').addEventListener('change', applyFilters);
            document.getElementById('filter-stock').addEventListener('change', applyFilters);
        });

        // --- CORE FUNCTIONS ---
        async function loadInventory() {
            const loading = document.getElementById('loading');
            const tbody = document.getElementById('inventory-table-body');
            
            loading.classList.remove('hidden');
            tbody.innerHTML = '';

            try {
                const res = await fetch(`${API_URL}/inventory/status`);
                const data = await res.json();
                
                if (Array.isArray(data)) {
                    globalInventory = data;
                    applyFilters();
                }
                loading.classList.add('hidden');
            } catch (e) { 
                console.error("Load failed:", e);
                loading.innerText = "Error loading inventory. Check connection.";
            }
        }

        function applyFilters() {
            const search = document.getElementById('filter-search').value.toLowerCase();
            const game = document.getElementById('filter-game').value;
            const type = document.getElementById('filter-type').value;
            const stock = document.getElementById('filter-stock').value;

            const filtered = globalInventory.filter(p => {
                // 1. Search
                const matchSearch = !search || 
                    p.card_name.toLowerCase().includes(search) || 
                    (p.card_id && p.card_id.toLowerCase().includes(search)) ||
                    (p.barcode && p.barcode.includes(search));
                
                // 2. Game
                const matchGame = !game || p.game_title === game;
                
                // 3. Type
                const matchType = !type || p.product_type === type;
                
                // 4. Stock
                let matchStock = true;
                if (stock === 'Out') matchStock = p.in_stock <= 0;
                if (stock === 'Low') matchStock = p.in_stock > 0 && p.in_stock < 5;
                if (stock === 'In') matchStock = p.in_stock > 0;

                return matchSearch && matchGame && matchType && matchStock;
            });
            
            renderTable(filtered);
        }

        function renderTable(items) {
            const tbody = document.getElementById('inventory-table-body');
            const empty = document.getElementById('empty-state');
            document.getElementById('result-count').innerText = `${items.length} Items Found`;

            if (items.length === 0) {
                tbody.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            tbody.innerHTML = items.map(p => `
                <tr class="border-b hover:bg-gray-50 transition group">
                    <td class="p-4">
                        <div class="font-bold text-gray-800 text-sm">${p.card_name}</div>
                        <div class="text-xs text-gray-400 font-mono mt-1">
                            ${p.card_id ? `ID: ${p.card_id}` : ''} 
                            ${p.barcode ? `| Bar: ${p.barcode}` : ''}
                        </div>
                    </td>
                    <td class="p-4">
                        <div class="flex flex-col items-start gap-1">
                            <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wide bg-gray-100 text-gray-600 border border-gray-200">
                                ${p.game_title}
                            </span>
                            <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wide ${getTypeColor(p.product_type)}">
                                ${p.product_type}
                            </span>
                        </div>
                    </td>
                    <td class="p-4 text-right">
                        <div class="font-bold text-gray-800">$${parseFloat(p.price).toFixed(2)}</div>
                        <div class="text-[10px] text-gray-400">Cost: $${parseFloat(p.cost_price || 0).toFixed(2)}</div>
                    </td>
                    <td class="p-4 text-center">
                        <div class="font-bold text-lg ${p.in_stock > 0 ? 'text-gray-800' : 'text-red-500'}">
                            ${p.in_stock}
                        </div>
                    </td>
                    <td class="p-4 text-right opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="openEditModal(${p.id})" class="text-blue-600 hover:text-blue-800 font-bold mr-3 text-sm">Edit</button>
                        <button onclick="deleteProduct(${p.id})" class="text-red-400 hover:text-red-600 font-bold text-sm">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        // --- HELPER: Colors for Tags ---
        function getTypeColor(type) {
            if (type.includes('Box')) return 'bg-purple-100 text-purple-700';
            if (type.includes('Single')) return 'bg-blue-100 text-blue-700';
            if (type.includes('Sleeve') || type.includes('Dice') || type.includes('Deck Box')) return 'bg-orange-100 text-orange-700';
            return 'bg-green-100 text-green-700';
        }

        // --- ADD PRODUCT LOGIC ---
        function toggleAddForm() {
            const form = document.getElementById('add-product-form');
            form.classList.toggle('hidden');
        }

        async function addProduct() {
            const data = {
                game_title: document.getElementById('add-game').value,
                product_type: document.getElementById('add-type').value,
                card_name: document.getElementById('add-name').value,
                price: document.getElementById('add-price').value,
                cost_price: document.getElementById('add-cost').value,
                stock_quantity: document.getElementById('add-stock').value,
                barcode: document.getElementById('add-barcode').value,
                card_id: document.getElementById('add-id').value
            };
            
            if (!data.card_name) return alert("Product Name is required");

            try {
                const res = await fetch(`${API_URL}/inventory/add`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(data) 
                });
                
                if (res.ok) {
                    alert("Product Added!");
                    // Clear Key Inputs
                    document.getElementById('add-name').value = '';
                    document.getElementById('add-barcode').value = '';
                    document.getElementById('add-id').value = '';
                    loadInventory(); 
                } else {
                    alert("Failed to add product.");
                }
            } catch (e) { alert("Connection Error"); }
        }

        // --- EDIT / DELETE LOGIC ---
        function openEditModal(id) {
            const p = globalInventory.find(x => x.id === id);
            document.getElementById('edit-id').value = p.id;
            document.getElementById('edit-name').value = p.card_name;
            document.getElementById('edit-price').value = p.price;
            document.getElementById('edit-cost').value = p.cost_price;
            document.getElementById('edit-stock').value = p.in_stock;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeEditModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        async function saveEdit() {
            const body = {
                price: document.getElementById('edit-price').value,
                cost_price: document.getElementById('edit-cost').value,
                stock_quantity: document.getElementById('edit-stock').value
            };
            try {
                await fetch(`${API_URL}/inventory/${document.getElementById('edit-id').value}`, {
                    method: 'PUT', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(body)
                });
                closeEditModal(); 
                loadInventory();
            } catch (e) { alert("Update failed"); }
        }

        async function deleteProduct(id) {
            if (confirm("Are you sure you want to delete this product?")) {
                await fetch(`${API_URL}/inventory/${id}`, { method: 'DELETE' });
                loadInventory();
            }
        }
    </script>
</body>
</html>
