<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K10 Admin - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <script src="admin-navbar.js"></script>

    <div class="max-w-5xl mx-auto px-4 mt-10 pb-12">

        <!-- Welcome header -->
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-gray-800">Dashboard</h2>
            <p class="text-gray-500 text-sm mt-1">Welcome back, <span id="welcome-name" class="font-semibold text-gray-700"></span>. Select a module to get started.</p>
        </div>

        <!-- All-staff shortcuts -->
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-3">Daily Operations</p>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <a href="admin-sales.html" class="bg-white p-5 rounded-xl shadow-sm hover:shadow-md transition border-t-4 border-green-500 text-center">
                <div class="text-2xl mb-2">💳</div>
                <div class="font-bold text-gray-800 text-sm">POS</div>
                <div class="text-xs text-gray-400 mt-0.5">New Sale</div>
            </a>
            <a href="admin-inventory.html" class="bg-white p-5 rounded-xl shadow-sm hover:shadow-md transition border-t-4 border-blue-500 text-center">
                <div class="text-2xl mb-2">📦</div>
                <div class="font-bold text-gray-800 text-sm">Inventory</div>
                <div class="text-xs text-gray-400 mt-0.5">Manage Stock</div>
            </a>
            <a href="admin-outstock.html" class="bg-white p-5 rounded-xl shadow-sm hover:shadow-md transition border-t-4 border-orange-400 text-center">
                <div class="text-2xl mb-2">📤</div>
                <div class="font-bold text-gray-800 text-sm">Outstock</div>
                <div class="text-xs text-gray-400 mt-0.5">Record Removals</div>
            </a>
            <a href="admin-customers.html" class="bg-white p-5 rounded-xl shadow-sm hover:shadow-md transition border-t-4 border-teal-500 text-center">
                <div class="text-2xl mb-2">👥</div>
                <div class="font-bold text-gray-800 text-sm">Customers</div>
                <div class="text-xs text-gray-400 mt-0.5">Master List</div>
            </a>
        </div>

        <!-- Admin-only shortcuts -->
        <div id="admin-section" class="hidden">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-3">Admin</p>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <a href="admin-purchase.html" class="bg-white p-5 rounded-xl shadow-sm hover:shadow-md transition border-t-4 border-purple-500 text-center">
                    <div class="text-2xl mb-2">🛒</div>
                    <div class="font-bold text-gray-800 text-sm">Order Stock</div>
                    <div class="text-xs text-gray-400 mt-0.5">Purchase Orders</div>
                </a>
                <a href="admin-PurchaseHistory.html" class="bg-white p-5 rounded-xl shadow-sm hover:shadow-md transition border-t-4 border-purple-300 text-center">
                    <div class="text-2xl mb-2">📜</div>
                    <div class="font-bold text-gray-800 text-sm">PO History</div>
                    <div class="text-xs text-gray-400 mt-0.5">Past Orders</div>
                </a>
                <a href="admin-suppliers.html" class="bg-white p-5 rounded-xl shadow-sm hover:shadow-md transition border-t-4 border-yellow-500 text-center">
                    <div class="text-2xl mb-2">🏢</div>
                    <div class="font-bold text-gray-800 text-sm">Suppliers</div>
                    <div class="text-xs text-gray-400 mt-0.5">Manage Vendors</div>
                </a>
                <a href="admin-staff.html" class="bg-white p-5 rounded-xl shadow-sm hover:shadow-md transition border-t-4 border-red-500 text-center">
                    <div class="text-2xl mb-2">🛡️</div>
                    <div class="font-bold text-gray-800 text-sm">Staff</div>
                    <div class="text-xs text-gray-400 mt-0.5">Access Management</div>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Auth gate — redirect to login if not authenticated
        if (!localStorage.getItem('k10_token')) {
            window.location.replace('login.html');
        }

        // Personalise welcome + show admin section if applicable
        const username = localStorage.getItem('k10_username') || 'User';
        const role = (localStorage.getItem('k10_role') || '').toLowerCase();
        document.getElementById('welcome-name').textContent = username;
        if (role === 'admin') {
            document.getElementById('admin-section').classList.remove('hidden');
        }
    </script>
</body>
</html>
