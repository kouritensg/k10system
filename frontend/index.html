<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K10 Card Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="bg-blue-600 text-white p-2 rounded-lg font-bold text-xl">K10</div>
                <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Card Shop</h1>
            </div>
            <a href="login.html" class="text-sm font-medium text-gray-500 hover:text-blue-600 border border-gray-200 px-4 py-2 rounded-full hover:border-blue-600 transition">
                Staff Login
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4">
        <div class="text-center max-w-lg">
            <div class="text-7xl mb-6">🚧</div>
            <h2 class="text-4xl font-extrabold text-gray-800 mb-4">Site Under Construction</h2>
            <p class="text-gray-500 text-lg mb-8">
                We're building something great. Our online store will be open soon —
                thank you for your patience!
            </p>
            <a href="login.html" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-full shadow-md transition">
                Staff Login
            </a>
        </div>
    </main>

    <footer class="bg-gray-800 text-gray-400 py-6">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm">
            <p>&copy; 2026 K10 Card Shop. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
